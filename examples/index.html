<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>henam-map demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #111; color: #fff; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 20px; background: #1a1a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 18px; letter-spacing: -0.5px; }
    header span { font-size: 12px; color: #888; }
    #map { flex: 1; }
    #controls {
      position: fixed; bottom: 24px; right: 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    button {
      background: #222; border: 1px solid #444; color: #fff;
      padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #333; }
    #info {
      position: fixed; bottom: 24px; left: 16px;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 8px;
      font-size: 12px; color: #aaa; font-family: monospace;
    }
  </style>
</head>
<body>
  <header>
    <h1>henam-map</h1>
    <span>v0.1.0 — open source WebGL map library</span>
  </header>
  <div id="map"></div>
  <div id="info">lat: — lng: — zoom: —</div>
  <div id="controls">
    <button id="btn-oslo">Oslo</button>
    <button id="btn-bergen">Bergen</button>
    <button id="btn-world">Verden</button>
    <button id="btn-zoom-in">+</button>
    <button id="btn-zoom-out">−</button>
  </div>

  <script type="module">
    import { Map } from '../src/index.js'

    const map = new Map('map', {
      center: { lng: 10.75, lat: 59.91 },
      zoom: 11
    })

    map.addMarker({ lng: 10.75, lat: 59.91, color: '#3b82f6', label: 'Oslo' })
    map.addMarker({ lng: 5.32, lat: 60.39, color: '#10b981', label: 'Bergen' })

    const info = document.getElementById('info')
    setInterval(() => {
      const c = map.getCenter()
      info.textContent = `lat: ${c.lat.toFixed(4)}  lng: ${c.lng.toFixed(4)}  zoom: ${map.getZoom().toFixed(2)}`
    }, 100)

    document.getElementById('btn-oslo').onclick = () =>
      map.flyTo({ center: { lng: 10.75, lat: 59.91 }, zoom: 12 })

    document.getElementById('btn-bergen').onclick = () =>
      map.flyTo({ center: { lng: 5.32, lat: 60.39 }, zoom: 12 })

    document.getElementById('btn-world').onclick = () =>
      map.flyTo({ center: { lng: 15, lat: 20 }, zoom: 2 })

    document.getElementById('btn-zoom-in').onclick = () =>
      map.setZoom(map.getZoom() + 1)

    document.getElementById('btn-zoom-out').onclick = () =>
      map.setZoom(map.getZoom() - 1)
  </script>
</body>
</html>
